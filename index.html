<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caminho da Luz ✨</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    touch-action: none;
    background: radial-gradient(circle at center, #0b0b1a, #000);
    font-family: 'Georgia', serif;
}

canvas {
    display: block;
}

/* CARTA */
#mensagem {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    width: 80%;
    max-width: 500px;
    height: 60vh;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);

    color: #ffffff;

    padding: 25px;
    border-radius: 12px;

    box-shadow: 0 0 30px rgba(0,0,0,0.5);

    text-align: justify;
    font-size: 16px;
    line-height: 1.8;

    overflow-y: auto;
    display: none;
}
</style>

</head>

<body>

<canvas id="game"></canvas>

<div id="mensagem"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* RESPONSIVO */
function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* PLAYER */
let player = {
    x: canvas.width / 2,
    y: canvas.height / 2
};

/* ALVO */
let target = null;

/* ESTRELAS */
let stars = Array.from({length:100}, () => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2
}));

/* LUZES */
let lights = Array.from({length:12}, () => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    active: true
}));

/* CLIQUE / TOQUE */
function detectarClique(x, y){
    lights.forEach(light => {
        if(light.active){
            let dist = Math.hypot(x - light.x, y - light.y);
            if(dist < 25){
                target = light;
            }
        }
    });
}

canvas.addEventListener("click", (e)=>{
    detectarClique(e.clientX, e.clientY);
});

canvas.addEventListener("touchstart", (e)=>{
    const t = e.touches[0];
    detectarClique(t.clientX, t.clientY);
});

/* PARTÍCULAS */
let particles = [];
let jogoFinalizado = false;

function update(){

    /* MOVIMENTO ATÉ A ESTRELA */
    if(target){
        let dx = target.x - player.x;
        let dy = target.y - player.y;
        let dist = Math.hypot(dx, dy);

        if(dist > 2){
            player.x += dx * 0.05;
            player.y += dy * 0.05;
        } else {
            target = null;
        }
    }

    /* COLISÃO */
    lights.forEach(light => {
        if(light.active){
            let dist = Math.hypot(player.x - light.x, player.y - light.y);

            if(dist < 15){
                light.active = false;

                for(let i=0;i<10;i++){
                    particles.push({
                        x: light.x,
                        y: light.y,
                        vx: (Math.random()-0.5)*2,
                        vy: (Math.random()-0.5)*2,
                        life: 50
                    });
                }
            }
        }
    });

    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
    });

    particles = particles.filter(p => p.life > 0);

    if(!jogoFinalizado && lights.every(l => !l.active)){
        jogoFinalizado = true;
        finalizar();
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    /* ESTRELAS */
    ctx.fillStyle = "white";
    stars.forEach(s=>{
        ctx.globalAlpha = Math.random();
        ctx.fillRect(s.x, s.y, s.size, s.size);
    });
    ctx.globalAlpha = 1;

    /* LUZES */
    lights.forEach(l=>{
        if(l.active){
            let glow = ctx.createRadialGradient(l.x,l.y,0,l.x,l.y,20);
            glow.addColorStop(0,"gold");
            glow.addColorStop(1,"transparent");

            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(l.x,l.y,20,0,Math.PI*2);
            ctx.fill();
        }
    });

    /* PARTÍCULAS */
    particles.forEach(p=>{
        ctx.fillStyle = "gold";
        ctx.fillRect(p.x,p.y,2,2);
    });

    /* PLAYER */
    let glow = ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,30);
    glow.addColorStop(0,"#00f7ff");
    glow.addColorStop(1,"transparent");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(player.x,player.y,30,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#00f7ff";
    ctx.beginPath();
    ctx.arc(player.x,player.y,5,0,Math.PI*2);
    ctx.fill();
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

/* CARTA */
function mostrarMensagemFinal() {
    const el = document.getElementById("mensagem");

    el.innerHTML = `
        <p>Entre tantas coisas boas que Deus criou, existem aquelas que carregam algo diferente... uma luz que não se explica, apenas se sente.</p>

        <p>E, de alguma forma, você é assim.</p>

        <p>Assim como o brilho das estrelas no céu reflete uma das mais perfeitas criações dEle, existe um brilho em você que reflete algo ainda mais profundo: a presença pura do Espírito Santo.</p>

        <p>Que você continue brilhando por onde passar, com essa leveza, com essa bondade, com essa identidade única que Deus escreveu pessoalmente em você.</p>

        <p>E quando tentarem te desanimar, não se preocupe... porque, com toda certeza, Deus olha pra você com alegria.</p>

        <p>Assim como Ester foi colocada no lugar certo, no momento certo, você também está sendo direcionada por Deus a estar exatamente onde Ele deseja te usar.</p>

        <p>Existe um propósito em quem você é, em cada detalhe seu, em cada caminho que você percorre. Nada é por acaso.</p>

        <p>Deus está te conduzindo para viver algo maior, para ser instrumento dEle de forma extraordinária.</p>

        <p><em>“Quem sabe se não foi para um momento como este que você chegou até aqui?”</em><br>(Ester 4:14)</p>

        <p><em>“Força e dignidade são os seus vestidos...”</em><br>(Provérbios 31:25)</p>

        <p class="final">Continue sendo exatamente quem você é.<br>Porque isso… já é incrível.</p>
    `;

    el.style.display = "block";
}

/* FINAL */
function finalizar(){
    setTimeout(mostrarMensagemFinal, 1000);
}

loop();
</script>

</body>
</html>
